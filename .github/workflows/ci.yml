name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: write
  packages: write
  pull-requests: write

jobs:
  # ── 1. Lint & format ──────────────────────────────────────────────────────
  lint:
    name: Lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Cache pre-commit envs
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}

      - run: pre-commit run --all-files

  # ── 2. Tests + coverage ───────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install -r requirements-dev.txt

      - name: Run tests with coverage
        run: |
          pytest tests/ \
            --junitxml=reports/junit.xml \
            --cov=app \
            --cov-report=xml:reports/coverage.xml \
            --cov-report=html:reports/htmlcov \
            --cov-fail-under=70

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: reports/htmlcov/
          retention-days: 30

  # ── 3. Docker build & push ────────────────────────────────────────────────
  docker:
    name: Docker
    runs-on: ubuntu-latest
    needs: [lint, test]
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      full_image: ${{ steps.meta.outputs.full_image }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Version ─────────────────────────────────────────────────────────
      # Next version = latest vX.Y.Z tag + patch increment.
      # Falls back to 0.1.0 on a fresh repo. Branch name is sanitized
      # (lowercase, non-alphanumeric → hyphen, max 30 chars) and appended
      # with the short SHA on non-main branches.
      - name: Compute version and tags
        id: meta
        env:
          REGISTRY: ${{ secrets.DOCKERHUB_USERNAME }}/budget-maker
          EVENT: ${{ github.event_name }}
          # head_ref is the source branch on PRs; ref_name is the branch on pushes
          BRANCH_RAW: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}
        run: |
          LATEST=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          if [ -z "$LATEST" ]; then
            BASE="0.1.0"
          else
            IFS='.' read -r MAJ MIN PAT <<< "${LATEST#v}"
            BASE="${MAJ}.${MIN}.$((PAT + 1))"
          fi

          SHORT_SHA=$(git rev-parse --short HEAD)

          # Sanitize: lowercase, replace non-alphanumeric with -, strip edges, truncate
          BRANCH=$(echo "$BRANCH_RAW" | tr '[:upper:]' '[:lower:]' \
            | sed 's/[^a-z0-9]/-/g; s/^-*//; s/-*$//' \
            | cut -c1-30)

          if [ "$EVENT" != "push" ] || [ "${{ github.ref }}" != "refs/heads/main" ]; then
            TAG="${BASE}-${BRANCH}-${SHORT_SHA}"
            DOCKER_TAGS="${REGISTRY}:${TAG}"
          else
            TAG="${BASE}"
            DOCKER_TAGS="${REGISTRY}:${TAG},${REGISTRY}:latest"
          fi

          echo "base=${BASE}"               >> "$GITHUB_OUTPUT"
          echo "image_tag=${TAG}"           >> "$GITHUB_OUTPUT"
          echo "docker_tags=${DOCKER_TAGS}" >> "$GITHUB_OUTPUT"
          echo "full_image=${REGISTRY}:${TAG}" >> "$GITHUB_OUTPUT"

      # ── PR: update title + create/update status comment ─────────────────
      - name: PR — set title and queued status
        if: github.event_name == 'pull_request'
        id: comment
        uses: actions/github-script@v7
        env:
          VERSION: ${{ steps.meta.outputs.base }}
        with:
          result-encoding: string
          script: |
            const { owner, repo } = context.repo;
            const prNumber = context.issue.number;
            const version = process.env.VERSION;
            const sha = context.sha.slice(0, 7);

            // ── Update PR title: strip old version prefix, prepend new one ──
            const { data: pr } = await github.rest.pulls.get({ owner, repo, pull_number: prNumber });
            const cleanTitle = pr.title.replace(/^\[v[\w.\-]+\]\s*/, '');
            await github.rest.pulls.update({
              owner, repo,
              pull_number: prNumber,
              title: `[v${version}] ${cleanTitle}`,
            });

            // ── Find or create the sticky build comment ──
            const comments = await github.rest.issues.listComments({ owner, repo, issue_number: prNumber });
            const existing = comments.data.find(
              c => c.user.type === 'Bot' && c.body.includes('<!-- docker-build -->')
            );

            const body = [
              '<!-- docker-build -->',
              '### 🐳 Docker Build',
              '| | |',
              '|---|---|',
              `| **Status** | ⏳ Queued |`,
              `| **Version** | \`${version}\` |`,
              `| **Commit**  | \`${sha}\` |`,
            ].join('\n');

            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
              return String(existing.id);
            }
            const { data } = await github.rest.issues.createComment({ owner, repo, issue_number: prNumber, body });
            return String(data.id);

      # ── Build & push ─────────────────────────────────────────────────────
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Update comment — Building
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          COMMENT_ID: ${{ steps.comment.outputs.result }}
          VERSION: ${{ steps.meta.outputs.base }}
        with:
          script: |
            await github.rest.issues.updateComment({
              owner: context.repo.owner, repo: context.repo.repo,
              comment_id: parseInt(process.env.COMMENT_ID),
              body: [
                '<!-- docker-build -->',
                '### 🐳 Docker Build',
                '| | |',
                '|---|---|',
                `| **Status** | 🔨 Building |`,
                `| **Version** | \`${process.env.VERSION}\` |`,
                `| **Commit**  | \`${context.sha.slice(0, 7)}\` |`,
              ].join('\n'),
            });

      - name: Build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: ${{ steps.meta.outputs.docker_tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update comment — Built
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          COMMENT_ID: ${{ steps.comment.outputs.result }}
          VERSION: ${{ steps.meta.outputs.base }}
        with:
          script: |
            await github.rest.issues.updateComment({
              owner: context.repo.owner, repo: context.repo.repo,
              comment_id: parseInt(process.env.COMMENT_ID),
              body: [
                '<!-- docker-build -->',
                '### 🐳 Docker Build',
                '| | |',
                '|---|---|',
                `| **Status** | 📦 Built — pushing... |`,
                `| **Version** | \`${process.env.VERSION}\` |`,
                `| **Commit**  | \`${context.sha.slice(0, 7)}\` |`,
              ].join('\n'),
            });

      - name: Push
        run: |
          echo "${{ steps.meta.outputs.docker_tags }}" | tr ',' '\n' | xargs -I{} docker push {}

      # ── PR comment: Pushed ───────────────────────────────────────────────
      - name: Update comment — Pushed
        if: github.event_name == 'pull_request' && success()
        uses: actions/github-script@v7
        env:
          COMMENT_ID: ${{ steps.comment.outputs.result }}
          VERSION: ${{ steps.meta.outputs.base }}
          FULL_IMAGE: ${{ steps.meta.outputs.full_image }}
        with:
          script: |
            await github.rest.issues.updateComment({
              owner: context.repo.owner, repo: context.repo.repo,
              comment_id: parseInt(process.env.COMMENT_ID),
              body: [
                '<!-- docker-build -->',
                '### 🐳 Docker Build',
                '| | |',
                '|---|---|',
                `| **Status** | ✅ Pushed |`,
                `| **Version** | \`${process.env.VERSION}\` |`,
                `| **Commit**  | \`${context.sha.slice(0, 7)}\` |`,
                '',
                '```bash',
                `docker pull ${process.env.FULL_IMAGE}`,
                '```',
              ].join('\n'),
            });

      # ── PR comment: Failed ───────────────────────────────────────────────
      - name: Update comment — Failed
        if: github.event_name == 'pull_request' && failure()
        uses: actions/github-script@v7
        env:
          COMMENT_ID: ${{ steps.comment.outputs.result }}
          VERSION: ${{ steps.meta.outputs.base }}
        with:
          script: |
            if (!process.env.COMMENT_ID) return;
            await github.rest.issues.updateComment({
              owner: context.repo.owner, repo: context.repo.repo,
              comment_id: parseInt(process.env.COMMENT_ID),
              body: [
                '<!-- docker-build -->',
                '### 🐳 Docker Build',
                '| | |',
                '|---|---|',
                `| **Status** | ❌ Failed — [view run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |`,
                `| **Version** | \`${process.env.VERSION}\` |`,
                `| **Commit**  | \`${context.sha.slice(0, 7)}\` |`,
              ].join('\n'),
            });

      # ── On main: create tag via API (verified) + GitHub Release ─────────
      - name: Create tag and release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/github-script@v7
        env:
          IMAGE_TAG: ${{ steps.meta.outputs.image_tag }}
          FULL_IMAGE: ${{ steps.meta.outputs.full_image }}
        with:
          script: |
            const tag = `v${process.env.IMAGE_TAG}`;
            const fullImage = process.env.FULL_IMAGE;

            // Create annotated tag via API — marked "verified" by GitHub,
            // no GPG key needed even when branch protection requires signed commits.
            let tagSha;
            try {
              const { data: tagObj } = await github.rest.git.createTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag,
                message: `Release ${tag}`,
                object: context.sha,
                type: 'commit',
              });
              tagSha = tagObj.sha;
            } catch (e) {
              if (e.status === 422) {
                core.info(`Tag ${tag} already exists, skipping.`);
                return;
              }
              throw e;
            }

            await github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `refs/tags/${tag}`,
              sha: tagSha,
            });

            // Auto-generate release notes from merged PRs since last release
            const { data: release } = await github.rest.repos.generateReleaseNotes({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
            });

            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: release.name,
              body: release.body + `\n\n## Docker image\n\n\`\`\`bash\ndocker pull ${fullImage}\n\`\`\`\n`,
              draft: false,
              prerelease: false,
            });
