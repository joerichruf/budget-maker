name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: write
  packages: write
  pull-requests: write

jobs:
  # ── 1. Lint & format ──────────────────────────────────────────────────────
  lint:
    name: Lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Cache pre-commit envs
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}

      - run: pre-commit run --all-files

  # ── 2. Tests + coverage ───────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install -r requirements-dev.txt

      - name: Run tests with coverage
        run: |
          pytest tests/ \
            --junitxml=reports/junit.xml \
            --cov=app \
            --cov-report=xml:reports/coverage.xml \
            --cov-report=html:reports/htmlcov \
            --cov-fail-under=70

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: reports/htmlcov/
          retention-days: 30

  # ── 3. Docker build & push ────────────────────────────────────────────────
  docker:
    name: Docker
    runs-on: ubuntu-latest
    needs: [lint, test]
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      full_image: ${{ steps.meta.outputs.full_image }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Version ─────────────────────────────────────────────────────────
      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v3
        with:
          versionSpec: "6.x"

      - name: Run GitVersion
        id: gv
        uses: gittools/actions/gitversion/execute@v3

      # ── Compute image tag ────────────────────────────────────────────────
      - name: Compute tags
        id: meta
        env:
          REGISTRY: ghcr.io/${{ github.repository }}
          BASE: ${{ steps.gv.outputs.majorMinorPatch }}
          SHORT_SHA: ${{ steps.gv.outputs.shortSha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          EVENT: ${{ github.event_name }}
        run: |
          if [ "$EVENT" = "pull_request" ]; then
            TAG="${BASE}-PR-${PR_NUMBER}-${SHORT_SHA}"
            DOCKER_TAGS="${REGISTRY}:${TAG}"
          else
            TAG="${BASE}"
            DOCKER_TAGS="${REGISTRY}:${TAG},${REGISTRY}:latest"
          fi
          echo "image_tag=${TAG}"         >> "$GITHUB_OUTPUT"
          echo "docker_tags=${DOCKER_TAGS}" >> "$GITHUB_OUTPUT"
          echo "full_image=${REGISTRY}:${TAG}" >> "$GITHUB_OUTPUT"

      # ── PR comment: find or create ────────────────────────────────────────
      - name: Find existing build comment
        if: github.event_name == 'pull_request'
        id: find-comment
        uses: actions/github-script@v7
        with:
          result-encoding: string
          script: |
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const found = comments.data.find(
              c => c.user.type === 'Bot' && c.body.includes('<!-- docker-build -->')
            );
            return found ? String(found.id) : '';

      - name: Post/update comment — Queued
        if: github.event_name == 'pull_request'
        id: comment
        uses: actions/github-script@v7
        env:
          EXISTING_ID: ${{ steps.find-comment.outputs.result }}
          IMAGE_TAG: ${{ steps.meta.outputs.image_tag }}
          FULL_IMAGE: ${{ steps.meta.outputs.full_image }}
        with:
          result-encoding: string
          script: |
            const body = [
              '<!-- docker-build -->',
              '### 🐳 Docker Build',
              '| | |',
              '|---|---|',
              `| **Status** | ⏳ Queued |`,
              `| **Image tag** | \`${process.env.IMAGE_TAG}\` |`,
              `| **Commit** | \`${context.sha.slice(0, 7)}\` |`,
            ].join('\n');
            const existingId = process.env.EXISTING_ID;
            if (existingId) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: parseInt(existingId), body,
              });
              return existingId;
            }
            const { data } = await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number, body,
            });
            return String(data.id);

      # ── PR comment: Building ─────────────────────────────────────────────
      - name: Update comment — Building
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          COMMENT_ID: ${{ steps.comment.outputs.result }}
          IMAGE_TAG: ${{ steps.meta.outputs.image_tag }}
          FULL_IMAGE: ${{ steps.meta.outputs.full_image }}
        with:
          script: |
            await github.rest.issues.updateComment({
              owner: context.repo.owner, repo: context.repo.repo,
              comment_id: parseInt(process.env.COMMENT_ID),
              body: [
                '<!-- docker-build -->',
                '### 🐳 Docker Build',
                '| | |',
                '|---|---|',
                `| **Status** | 🔨 Building & pushing... |`,
                `| **Image tag** | \`${process.env.IMAGE_TAG}\` |`,
                `| **Commit** | \`${context.sha.slice(0, 7)}\` |`,
              ].join('\n'),
            });

      # ── Build & push ─────────────────────────────────────────────────────
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.docker_tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── PR comment: Pushed ───────────────────────────────────────────────
      - name: Update comment — Pushed
        if: github.event_name == 'pull_request' && success()
        uses: actions/github-script@v7
        env:
          COMMENT_ID: ${{ steps.comment.outputs.result }}
          IMAGE_TAG: ${{ steps.meta.outputs.image_tag }}
          FULL_IMAGE: ${{ steps.meta.outputs.full_image }}
        with:
          script: |
            await github.rest.issues.updateComment({
              owner: context.repo.owner, repo: context.repo.repo,
              comment_id: parseInt(process.env.COMMENT_ID),
              body: [
                '<!-- docker-build -->',
                '### 🐳 Docker Build',
                '| | |',
                '|---|---|',
                `| **Status** | ✅ Pushed |`,
                `| **Image** | \`${process.env.FULL_IMAGE}\` |`,
                `| **Commit** | \`${context.sha.slice(0, 7)}\` |`,
                '',
                '**Pull this image:**',
                '```bash',
                `docker pull ${process.env.FULL_IMAGE}`,
                '```',
              ].join('\n'),
            });

      # ── PR comment: Failed ───────────────────────────────────────────────
      - name: Update comment — Failed
        if: github.event_name == 'pull_request' && failure()
        uses: actions/github-script@v7
        env:
          COMMENT_ID: ${{ steps.comment.outputs.result }}
          IMAGE_TAG: ${{ steps.meta.outputs.image_tag }}
        with:
          script: |
            if (!process.env.COMMENT_ID) return;
            await github.rest.issues.updateComment({
              owner: context.repo.owner, repo: context.repo.repo,
              comment_id: parseInt(process.env.COMMENT_ID),
              body: [
                '<!-- docker-build -->',
                '### 🐳 Docker Build',
                '| | |',
                '|---|---|',
                `| **Status** | ❌ Failed — see [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |`,
                `| **Image tag** | \`${process.env.IMAGE_TAG}\` |`,
                `| **Commit** | \`${context.sha.slice(0, 7)}\` |`,
              ].join('\n'),
            });

      # ── On main: push git tag + create GitHub Release ────────────────────
      - name: Push version tag
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          TAG="v${{ steps.meta.outputs.image_tag }}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$TAG" && git push origin "$TAG" || echo "Tag $TAG already exists"

      - name: Create GitHub Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.meta.outputs.image_tag }}
          generate_release_notes: true
          body: |
            ## Docker image

            ```bash
            docker pull ${{ steps.meta.outputs.full_image }}
            ```

            Or pin in `docker-compose.yml`:
            ```yaml
            image: ${{ steps.meta.outputs.full_image }}
            ```
