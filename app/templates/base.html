<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Budget Maker{% endblock %}</title>
  <script>
    (function(){
      var t = localStorage.getItem('bm-theme');
      if (t) document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css" />
  <link rel="stylesheet" href="/static/css/app.css" />
</head>
<body>
  <header class="site-header">
    <div class="container">
      <nav class="site-nav">

        <a href="/" class="nav-brand" aria-label="Budget Maker home">
          <svg width="22" height="22" viewBox="0 0 22 22" fill="none" aria-hidden="true">
            <rect width="22" height="22" rx="6" fill="#6366f1" class="brand-logo-rect"/>
            <circle cx="11" cy="11" r="4" stroke="white" stroke-width="1.5"/>
            <line x1="11" y1="5.5" x2="11" y2="7" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="11" y1="15" x2="11" y2="16.5" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="5.5" y1="11" x2="7" y2="11" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="15" y1="11" x2="16.5" y2="11" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          <span>Budget Maker</span>
        </a>

        <ul class="nav-links" role="list">
          <li><a href="/" class="nav-link">Transactions</a></li>
          <li><a href="/dashboard" class="nav-link">Dashboard</a></li>
          <li><a href="/insights" class="nav-link">Insights</a></li>
          <li><a href="/goals" class="nav-link">Goals</a></li>
          <li><a href="/budgets" class="nav-link">Budgets</a></li>
          <li><a href="/review" class="nav-link">Review</a></li>
          <li><a href="/subscriptions" class="nav-link">Subscriptions</a></li>
          <li><a href="/digest" class="nav-link">Digest</a></li>
          <li><a href="/users" class="nav-link">Users</a></li>
        </ul>

        <div class="nav-end">
          <a href="/import" class="nav-import-btn">+ Import</a>
          <button class="theme-toggle" id="themeToggle" type="button" aria-label="Toggle colour theme">
            <svg id="iconSun" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
              <circle cx="12" cy="12" r="4"/>
              <line x1="12" y1="2"  x2="12" y2="5"/>
              <line x1="12" y1="19" x2="12" y2="22"/>
              <line x1="2"  y1="12" x2="5"  y2="12"/>
              <line x1="19" y1="12" x2="22" y2="12"/>
              <line x1="4.22"  y1="4.22"  x2="6.34"  y2="6.34"/>
              <line x1="17.66" y1="17.66" x2="19.78" y2="19.78"/>
              <line x1="4.22"  y1="19.78" x2="6.34"  y2="17.66"/>
              <line x1="17.66" y1="6.34"  x2="19.78" y2="4.22"/>
            </svg>
            <svg id="iconMoon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true" style="display:none">
              <path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79Z"/>
            </svg>
          </button>
        </div>

      </nav>
    </div>
  </header>

  <main class="container main-content">
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <div class="container">
      <small class="muted">Budget Maker</small>
    </div>
  </footer>

  <script>
    (function () {
      var root = document.documentElement;

      function applyTheme(theme) {
        root.setAttribute('data-theme', theme);
        localStorage.setItem('bm-theme', theme);
        document.getElementById('iconSun').style.display  = theme === 'dark' ? 'none' : '';
        document.getElementById('iconMoon').style.display = theme === 'dark' ? '' : 'none';
      }

      // Sync icons with current theme (may have been set by in-head script)
      applyTheme(root.getAttribute('data-theme') || 'light');

      document.getElementById('themeToggle').addEventListener('click', function () {
        applyTheme(root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
      });

      // Active nav link
      var path = window.location.pathname;
      document.querySelectorAll('.nav-link').forEach(function (a) {
        var href = a.getAttribute('href');
        var active = href === '/' ? path === '/' : (path === href || path.startsWith(href + '/'));
        if (active) a.classList.add('active');
      });
    })();
  </script>
</body>
</html>
